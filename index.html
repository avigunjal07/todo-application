<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>to-do application</title>

    <style>
        body{
            margin: 0px;
            padding: 0px;
            background-color: #26CCC2;
        }
        #main-heading{
            text-align: center;
            color: white;
            font-size: 60px;
        }
        .todo-container{
            height: 375px;
            overflow-y: scroll;
        }
        .todo-container-card{
            background-color: white;
            color: #216a6aaf;
            height: fit-content;
            width: 50%;
            margin: 20px auto;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px 3px teal;
            font-size: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #addNewCard{
            background-color: white;
            border-radius: 20px;
            padding: 10px 20px;
            width: 400px;
            border: none;
            box-shadow: 0px 0px 5px 3px rgba(0, 128, 128, 0.56);
            }
        #addToDoBtn{
            padding: 8px 20px;
            border-radius: 10px;
            background-color: rgb(167, 245, 245);
            border-color: rgba(0,0,0,0.5);
            margin: 0px 25px;
        }
        #addToDoBtn:hover{
            border-color: rgba(255,255,255,0.5);  
        }
        .addToDo-container{
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
        }   
        #deleteIcon{
            height: 20px;
        }
        
    </style>
</head>
<body>
    <h1 id="main-heading">to-do appliation</h1>

    <div class="todo-container" id="todo-container">
        
    </div>

    <div class="addToDo-container">
        <div class="addToDo">
            <input type="text" placeholder="Add new to list" id="addNewCard">        
        </div>
        <button id="addToDoBtn" onclick="addToCard()">Add </button>
    </div>

    <script>
        let listArray=["Make Tea and Coffee"];
        const todoContainerElement=document.getElementById('todo-container');

        const addInputElement=document.getElementById('addNewCard');

        for(let i=0;i<listArray.length;i++){
            let listElement=listArray[i];
            todoContainerElement.innerHTML=todoContainerElement.innerHTML+`
            <div class="todo-container-card">
            ${listElement}
            <img src="./images/delete.png" alt="delete-icon" id="deleteIcon">
            </div>`;
        }

        const addToCard=()=>{
            let addinput=addInputElement.value
            listArray.push(addinput);
            if(addinput=="") return;

            todoContainerElement.innerHTML+=`
            <div class="todo-container-card">
            ${addinput}
            <img src="./images/delete.png" alt="delete-icon" id="deleteIcon">
            </div>`;
            addInputElement.value="";
        }

    </script>

</body>
</html>
