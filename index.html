<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do Application</title>

    <style>
        body{
            margin: 0;
            padding: 0;
            background-color: #26CCC2;
        }

        #main-heading{
            text-align: center;
            color: white;
            font-size: 60px;
        }

        .todo-container{
            height: 400px;
            overflow-y: scroll;
        }

        .todo-container-card{
            background-color: white;
            color: #216a6aaf;
            width: 50%;
            margin: 20px auto;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px 3px teal;
            font-size: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #addNewCard{
            background-color: white;
            border-radius: 20px;
            padding: 10px 20px;
            width: 400px;
            border: none;
            box-shadow: 0px 0px 5px 3px rgba(0, 128, 128, 0.56);
        }

        #addToDoBtn{
            padding: 8px 20px;
            border-radius: 10px;
            background-color: rgb(167, 245, 245);
            border: 1px solid rgba(0,0,0,0.5);
            margin-left: 20px;
            cursor: pointer;
        }

        #addToDoBtn:hover{
            border-color: rgba(255,255,255,0.5);  
        }

        .addToDo-container{
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
        }

        .delete-btn{
            border: none;
            background-color: white;
            cursor: pointer;
        }

        .delete-btn img{
            height: 20px;
        }

    </style>
</head>

<body>
    
    <h1 id="main-heading">To-Do Application</h1>

    <div class="todo-container" id="todo-container">
    </div>

    <div class="addToDo-container">
        <input type="text" placeholder="Add new task" id="addNewCard">
        <button id="addToDoBtn" onclick="addToCard()">Add</button>
    </div>

    <script>

        let listArray = [];

        const todoContainerElement = document.getElementById('todo-container');
        const addInputElement = document.getElementById('addNewCard');

        function loaddata() {
            const storedData = JSON.parse(localStorage.getItem("todoArray")) || [];
            listArray = storedData;
            todoContainerElement.innerHTML = "";

            listArray.forEach((item, index) => {
                todoContainerElement.innerHTML += `
                <div class="todo-container-card">
                        ${item}
                        <button class="delete-btn" onclick="deleteCard(${index})">
                            <img src="./images/delete.png" alt="delete">
                        </button>
                    </div>`;
            });
        }
        function addToCard() {
            const addinput = addInputElement.value.trim();
            if(addinput === "") return;
            listArray.push(addinput);
            localStorage.setItem("todoArray", JSON.stringify(listArray));
            addInputElement.value = "";
            loaddata();
        }
        function deleteCard(index) {
            listArray.splice(index, 1);
            localStorage.setItem("todoArray", JSON.stringify(listArray));
            loaddata();
        }
        loaddata();

    </script>

</body>
</html>
